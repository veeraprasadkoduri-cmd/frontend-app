<!DOCTYPE html>
<html>
<head>
    <title>Blood Donation Camp - Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            text-align: center;
        }

        h1 {
            background-color: red;
            color: white;
            padding: 15px;
        }

        .form-container {
            background: white;
            width: 400px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
            text-align: left;
        }

        label {
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: red;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: darkred;
        }

        .thank-you {
            display: none;
            color: green;
            font-weight: bold;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<h1>Blood Donation Camp Registration</h1>

<div class="form-container">

    <label>Full Name</label>
    <input type="text" id="name" placeholder="Enter your full name">

    <label>Mobile Number</label>
    <input type="text" id="mobile" placeholder="Enter mobile number">

    <label>Age</label>
    <input type="number" id="age" placeholder="Enter your age">

    <label>Gender</label>
    <select id="gender">
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
    </select>

    <label>Blood Group</label>
    <select id="bloodgroup">
        <option value="">Select Blood Group</option>
        <option>A+</option>
        <option>A-</option>
        <option>B+</option>
        <option>B-</option>
        <option>O+</option>
        <option>O-</option>
        <option>AB+</option>
        <option>AB-</option>
    </select>

    <label>Address</label>
    <textarea id="address" rows="3" placeholder="Enter your address"></textarea>

    <button onclick="submitForm()">Register</button>

    <div class="thank-you" id="thankYouMessage">
        ✅ Thank you for registering!  
        Blood Donation Camp Test Team appreciates your support ❤️
    </div>

</div>

<script>
    function submitForm() {

        let name = document.getElementById("name").value;
        let mobile = document.getElementById("mobile").value;
        let bloodgroup = document.getElementById("bloodgroup").value;

        if (name === "" || mobile === "" || bloodgroup === "") {
            alert("Please fill all required details!");
            return;
        }

        document.getElementById("thankYouMessage").style.display = "block";
    }
</script>

</body>
